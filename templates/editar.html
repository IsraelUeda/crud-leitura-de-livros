<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Livro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="container header-row">
      <div>
        <h1>Editar Livro</h1>
        <p>Atualize as informações do livro selecionado.</p>
      </div>
      <a class="button" href="{{ url_for('index') }}">Voltar</a>
    </div>
  </header>

  <main class="container">
    {% if erro %}
      <div class="error-message">{{ erro }}</div>
    {% endif %}
    <form method="post" class="form-card">
      <label>
        Título
        <input type="text" name="titulo" value="{{ livro['titulo'] }}" required>
      </label>
      <label>
        Autor
        <input type="text" name="autor" value="{{ livro['autor'] }}" required>
      </label>
      <label>
        Status
        <select name="status" required>
          <option value="Lido" {{ 'selected' if livro['status'] == 'Lido' }}>Lido</option>
          <option value="Lendo" {{ 'selected' if livro['status'] == 'Lendo' }}>Lendo</option>
          <option value="Quero ler" {{ 'selected' if livro['status'] == 'Quero ler' }}>Quero ler</option>
        </select>
      </label>
      <label>
        Nota
        <input type="number" name="nota" min="0" max="10" value="{{ livro['nota'] if livro['nota'] is not none else '' }}">
      </label>
      <div class="form-actions">
        <button class="button" type="submit">Atualizar</button>
        <a class="button secondary" href="{{ url_for('index') }}">Cancelar</a>
      </div>
    </form>
  </main>
</body>
</html>
