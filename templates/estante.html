<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Estante</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estante.css') }}">
</head>
<body>
  
  <header>
    <div class="header-row">
      <div>
        <h1>Meus Livros</h1>
        <p>Lista de livros cadastrados com metadados e PDF.</p>
      </div>
      <div class="actions">
        <a class="button" href="{{ url_for('estante') }}">Minha Estante</a>
        <a class="button" href="{{ url_for('adicionar') }}">Adicionar Livro</a>
        <a class="button" href="{{ url_for('buscar') }}">Buscar Open Library</a>
      </div>
    </div>
  </header>

  <div id="minha-estante"></div>
  <script>
    window.INITIAL_LIVROS = {{ livros|tojson }};
    window.API = {
      addBook: "{{ url_for('estante_api_add') }}",
      deleteBookPrefix: "{{ url_for('estante_api_deletar', id=0)|replace('/0','/') }}"
    };
  </script>
  <script src="{{ url_for('static', filename='js/estante.js') }}"></script>
</body>
</html>
